<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title> لوحات فنية </title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- خط عربي -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)),
                  url("art touch.png");
      background-size: cover;
      background-position: center;
    }

    .hero {
      padding: 60px 20px;
      text-align: center;
    }

    .card img {
      height: 220px;
      object-fit: cover;
    }

    .card {
      border: none;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }
  </style>
</head>

<body>

<!-- عنوان -->
<section class="hero">
  <div class="container">
    <h1 class="fw-bold"> لوحات فنية</h1>
    <p class="text-muted">
     اللوحة الفنية هي تعبير بصري يُجسد أفكار ومشاعر الفنان على سطح مستوٍ (مثل الكانفاس أو الورق) باستخدام وسائط لونية مختلفة، بهدف إيصال رسالة جمالية أو فكرية للمتلقي.
    </p>
  </div>
</section>
